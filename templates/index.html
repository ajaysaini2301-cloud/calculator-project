<!DOCTYPE html>
<html>
<head>
    <title>Button Calculator</title>
    <style>
        body { font-family: Arial; background: #1e1e1e; display: flex; justify-content: center; padding-top: 50px; }
       .calculator { background: #2d2d2d; padding: 20px; border-radius: 10px; width: 300px; }
        #display { width: 100%; height: 60px; font-size: 28px; text-align: right; margin-bottom: 10px; padding: 10px; box-sizing: border-box; background: #444; color: white; border: none; border-radius: 5px; }
       .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { padding: 20px; font-size: 20px; border: none; border-radius: 5px; cursor: pointer; background: #555; color: white; }
        button:hover { background: #666; }
       .operator { background: #ff9500; }
       .operator:hover { background: #ffad33; }
       .equals { background: #ff9500; grid-column: span 2; }
       .clear { background: #a5a5a5; color: black; grid-column: span 2; }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" id="display" readonly>
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button onclick="appendToDisplay('/')">/</button>
            <button class="operator" onclick="appendToDisplay('*')">×</button>

            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button class="operator" onclick="appendToDisplay('-')">-</button>

            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button class="operator" onclick="appendToDisplay('+')">+</button>

            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button class="equals" onclick="calculateResult()">=</button>

            <button onclick="appendToDisplay('0')" style="grid-column: span 2;">0</button>
            <button onclick="appendToDisplay('.')">.</button>
        </div>
    </div>

    <script>
        let display = document.getElementById('display');

        function appendToDisplay(value) {
            display.value += value;
        }

        function clearDisplay() {
            display.value = '';
        }

        async function calculateResult() {
            let expression = display.value;

            // Regex से num1, operator, num2 निकालो
            let parts = expression.match(/(\d+\.?\d*)([\+\-\*\\/])(\d+\.?\d*)/);

            if (!parts) {
                display.value = 'Error';
                return;
            }

            let num1 = parts[1];
            let operation = parts[2];
            let num2 = parts[3];

            // Flask को डेटा भेजो
            const response = await fetch('/calculate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ num1: num1, num2: num2, operation: operation })
            });

            const data = await response.json();

            if (data.error) {
                display.value = data.error;
            } else {
                display.value = data.result;
            }
        }
    </script>
</body>
</html>
